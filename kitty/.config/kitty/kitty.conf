# =============================================================================
# Font Configuration
# =============================================================================
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16
disable_ligatures always
modify_font cell_width 90%
modify_font cell_height 120%

# =============================================================================
# Andromeda Color Scheme
# =============================================================================
foreground #e5e5e5
background #262a33
cursor #f8f8f0
cursor_trail 1
cursor_shape block
cursor_text_color #b5b5a8
selection_foreground #262a33
selection_background #e5e5e5

# Normal colors
color0  #000000
color1  #cd3131
color2  #05bc79
color3  #e5e512
color4  #2472c8
color5  #bc3fbc
color6  #0fa8cd
color7  #e5e5e5

# Bright colors
color8  #666666
color9  #cd3131
color10 #05bc79
color11 #e5e512
color12 #2472c8
color13 #bc3fbc
color14 #0fa8cd
color15 #e5e5e5

# =============================================================================
# Window Appearance
# =============================================================================
background_opacity 0.92
background_blur 95
hide_window_decorations titlebar-only
window_padding_width 5 4 0 4
confirm_os_window_close 0

# =============================================================================
# Tab Bar (matches wezterm custom tab styling)
# =============================================================================
tab_bar_style powerline
tab_bar_min_tabs 2
tab_bar_align left
tab_bar_edge top
tab_powerline_style slanted
active_tab_foreground   #000000
active_tab_background   #ffad33
inactive_tab_foreground #000000
inactive_tab_background #05fef3
tab_bar_background      #0b0022
tab_title_max_length    45
tab_title_template      " {index}: {tab.active_wd.split('/')[-1] if tab.active_wd else title} "

# =============================================================================
# Cursor & Animation
# =============================================================================
cursor_blink_interval 0

# =============================================================================
# Layout (enable splits)
# =============================================================================
enabled_layouts splits,stack
shell_integration no-cursor

# =============================================================================
# Remote control (needed for smart-splits.nvim integration)
# =============================================================================
allow_remote_control yes
listen_on unix:/tmp/mykitty

# =============================================================================
# macOS specific
# =============================================================================
macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# =============================================================================
# Key Bindings
# =============================================================================

# Clear default ctrl+p so it passes through to apps (opencode, etc.)
map ctrl+p no_op
map ctrl+shift+p no_op

# Split horizontally (pane below) - 25%
map ctrl+shift+h launch --location=hsplit --cwd=current
map ctrl+b launch --location=hsplit --cwd=current

# Split vertically (pane to the right)
map ctrl+shift+v launch --location=vsplit --cwd=current
map ctrl+backslash launch --location=vsplit --cwd=current

# Navigate between panes
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right

# Unset the mapping to pass the keys to neovim
map --when-focus-on var:IS_NVIM ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k
map --when-focus-on var:IS_NVIM ctrl+h
map --when-focus-on var:IS_NVIM ctrl+l

# Activate pane above (matches wezterm ctrl+- behavior)
map ctrl+minus neighboring_window up

# Pane selection (focus visible window)
map ctrl+o focus_visible_window

# New tab
map cmd+t new_tab_with_cwd

# Navigate tabs by number
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Tab navigator
map alt+1 select_tab

# Resize panes (Meta/Alt + h/j/k/l)
map alt+h kitten relative_resize.py left  3
map alt+j kitten relative_resize.py down  3
map alt+k kitten relative_resize.py up    3
map alt+l kitten relative_resize.py right 3

# Unset resize mappings to pass the keys to neovim
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+l

## Copy and Paste actions
copy_on_select yes
map cmd+c        copy_to_clipboard
map cmd+v        paste_from_clipboard
map shift+insert paste_from_clipboard
